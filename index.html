<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafics Hub - Creative Feed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #f8fafc; }
        .hub-border { border: 1px solid #1e293b; }
        .card-hover:hover { border-color: #38bdf8; background-color: #1e293b; }
        .sidebar-accent { background-color: #1e293b; width: 4px; }
        .hub-brand { color: #38bdf8; font-weight: 900; letter-spacing: -0.5px; }
        
        #entry-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%);
        }

        /* Passcode Dot Styling */
        .passcode-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid #334155;
            transition: all 0.2s ease;
        }
        .passcode-dot.active {
            background-color: #38bdf8;
            border-color: #38bdf8;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
            transform: scale(1.1);
        }

        .keypad-btn {
            background: #1e293b;
            border: 1px solid #334155;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            font-weight: 800;
            font-size: 1.25rem;
            transition: all 0.2s;
            color: #94a3b8;
        }
        .keypad-btn:hover {
            border-color: #38bdf8;
            color: #38bdf8;
            background: #0f172a;
        }
        .keypad-btn:active {
            transform: scale(0.9);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake-ui {
            animation: shake 0.4s ease-in-out;
        }
    </style>
</head>
<body>

    <!-- Gatekeeper Screen -->
    <div id="entry-screen">
        <div id="entry-card" class="bg-[#1e293b] p-10 rounded-[2rem] shadow-2xl w-full max-w-md text-center border border-slate-700">
            <div class="gradient-bg w-20 h-20 rounded-2xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-blue-900/20 rotate-3">
                <i class="fa-solid fa-layer-group text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black uppercase tracking-tight mb-2">Grafics Hub</h1>
            <p class="text-slate-400 text-sm mb-6 font-medium">Secure Terminal Access</p>
            
            <div class="space-y-6">
                <!-- Passcode Visual Dots (Updated to 6 for the longest code) -->
                <div class="flex justify-center gap-4 py-2">
                    <div class="passcode-dot" id="dot-0"></div>
                    <div class="passcode-dot" id="dot-1"></div>
                    <div class="passcode-dot" id="dot-2"></div>
                    <div class="passcode-dot" id="dot-3"></div>
                    <div class="passcode-dot" id="dot-4"></div>
                    <div class="passcode-dot" id="dot-5"></div>
                </div>

                <!-- Clickable Keypad Grid -->
                <div class="grid grid-cols-3 gap-3 max-w-[220px] mx-auto">
                    <button class="keypad-btn" onclick="pressKey('1')">1</button>
                    <button class="keypad-btn" onclick="pressKey('2')">2</button>
                    <button class="keypad-btn" onclick="pressKey('3')">3</button>
                    <button class="keypad-btn" onclick="pressKey('4')">4</button>
                    <button class="keypad-btn" onclick="pressKey('5')">5</button>
                    <button class="keypad-btn" onclick="pressKey('6')">6</button>
                    <button class="keypad-btn" onclick="pressKey('7')">7</button>
                    <button class="keypad-btn" onclick="pressKey('8')">8</button>
                    <button class="keypad-btn" onclick="pressKey('9')">9</button>
                    <button class="keypad-btn col-start-2" onclick="pressKey('0')">0</button>
                    <button class="keypad-btn text-rose-500" onclick="clearKeys()">
                        <i class="fa-solid fa-rotate-left text-sm"></i>
                    </button>
                </div>

                <!-- Submit Button -->
                <button onclick="handleEntry()" id="unlock-btn" class="w-full gradient-bg text-white py-5 rounded-2xl font-black text-sm shadow-lg hover:shadow-sky-500/20 active:scale-95 transition-all uppercase tracking-widest">
                    Initialize Hub
                </button>
            </div>
            <p id="error-msg" class="text-rose-500 text-xs mt-6 font-bold hidden bg-rose-500/10 py-2 rounded-lg">Access Denied: Invalid Key</p>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="main-app" class="opacity-0 transition-opacity duration-700 hidden">
        <!-- Navbar -->
        <nav class="bg-[#0f172a]/80 backdrop-blur-md h-16 border-b border-slate-800 fixed w-full top-0 z-50 flex items-center px-8 justify-between">
            <div class="flex items-center gap-3">
                <div class="gradient-bg p-2 rounded-lg">
                    <i class="fa-solid fa-layer-group text-white text-lg"></i>
                </div>
                <span class="text-xl hub-brand uppercase tracking-tighter">Grafics Hub</span>
            </div>
            
            <div class="flex items-center gap-6">
                <div id="node-indicator" class="hidden md:flex items-center gap-2 px-3 py-1 bg-slate-800 rounded-full border border-slate-700">
                    <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <span id="active-node-text" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Node 1</span>
                </div>
                
                <div class="flex items-center gap-3 pl-6 border-l border-slate-800">
                    <img id="user-avatar" src="" class="w-8 h-8 rounded-full bg-slate-800 border border-slate-700">
                    <span id="user-display-name" class="text-xs font-black text-slate-200 uppercase"></span>
                    <button onclick="handleLock()" class="ml-2 text-slate-500 hover:text-rose-500 transition-colors">
                        <i class="fa-solid fa-power-off text-sm"></i>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Content -->
        <main class="max-w-[1200px] mx-auto px-8 pt-24 flex gap-10">
            <!-- Sidebar -->
            <aside class="hidden lg:block w-64 space-y-8">
                <div class="p-4 bg-slate-900/50 rounded-2xl border border-slate-800">
                    <h4 class="text-slate-500 font-black uppercase text-[10px] tracking-widest mb-6">Asset Network</h4>
                    <div class="space-y-4">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-circle text-[8px] text-sky-500"></i>
                            <span class="text-xs font-bold text-slate-300">Global Stream</span>
                        </div>
                        <div class="flex items-center gap-3 opacity-40">
                            <i class="fa-solid fa-circle text-[8px] text-slate-600"></i>
                            <span class="text-xs font-bold text-slate-500">Private Vault</span>
                        </div>
                    </div>
                </div>

                <div class="p-6 gradient-bg rounded-2xl text-white">
                    <h5 class="font-black text-xs uppercase mb-2">Pro Tip</h5>
                    <p class="text-[10px] leading-relaxed opacity-90">Switch between nodes if you experience latency. All creative shouts are synced across the cluster.</p>
                </div>
            </aside>

            <!-- Feed -->
            <div class="flex-1 space-y-8 pb-20">
                <div class="bg-[#1e293b] p-6 rounded-3xl border border-slate-800 shadow-xl">
                    <div class="flex items-start gap-4">
                        <img id="create-avatar" src="" class="w-12 h-12 rounded-2xl bg-slate-800">
                        <div class="flex-1 space-y-4">
                            <textarea id="shout-input" rows="2" placeholder="Describe your next masterpiece..." 
                                class="w-full bg-[#0f172a] rounded-2xl px-6 py-4 text-sm outline-none border-2 border-transparent focus:border-sky-500 transition-all resize-none"></textarea>
                            <div class="flex justify-between items-center">
                                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Post to creative feed</span>
                                <button onclick="submitShout()" class="gradient-bg text-white px-10 py-3 rounded-xl font-black text-xs shadow-lg hover:scale-105 active:scale-95 transition-all">
                                    PUBLISH
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="shouts-list" class="space-y-6">
                    <!-- Shouts -->
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'grafics-hub-v1';

        const STORAGE_NODES = ['creative_main', 'creative_node_b', 'creative_fallback'];
        let activeNodeIndex = 0;

        // Updated Passcodes
        const PASS_MAP = {
            '19837': 'James',
            '20147': 'Jasper'
        };

        let currentUserName = "";
        let authenticatedUser = null;
        let unsubscribeShouts = null;
        let enteredPasscode = "";

        const dots = [0,1,2,3,4,5].map(i => document.getElementById(`dot-${i}`));

        window.pressKey = (num) => {
            if (enteredPasscode.length < 6) {
                enteredPasscode += num;
                updateDots();
            }
        };

        window.clearKeys = () => {
            enteredPasscode = "";
            updateDots();
        };

        function updateDots() {
            dots.forEach((dot, i) => {
                if (i < enteredPasscode.length) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            });
        }

        // AUTH & ENTRY
        window.handleEntry = async () => {
            const pass = enteredPasscode;
            const error = document.getElementById('error-msg');
            const btn = document.getElementById('unlock-btn');
            const card = document.getElementById('entry-card');
            
            if (PASS_MAP[pass]) {
                btn.disabled = true;
                btn.textContent = "VERIFYING...";
                currentUserName = PASS_MAP[pass];
                error.classList.add('hidden');
                
                try {
                    let userCredential;
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        userCredential = await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        userCredential = await signInAnonymously(auth);
                    }
                    authenticatedUser = userCredential.user;
                } catch (e) {
                    console.error("Auth error:", e);
                    error.textContent = "Network Error: Retrying...";
                    error.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = "Initialize Hub";
                }
            } else {
                error.textContent = "Access Denied: Invalid Key";
                error.classList.remove('hidden');
                clearKeys();
                
                card.classList.add('shake-ui');
                setTimeout(() => card.classList.remove('shake-ui'), 400);
            }
        };

        window.handleLock = async () => {
            try {
                if (unsubscribeShouts) unsubscribeShouts();
                await signOut(auth);
                location.reload(); 
            } catch (e) {
                console.error("Lock error:", e);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user && currentUserName) {
                authenticatedUser = user;
                setupUI();
            }
        });

        function setupUI() {
            const entryScreen = document.getElementById('entry-screen');
            const mainApp = document.getElementById('main-app');
            entryScreen.style.display = 'none';
            mainApp.classList.remove('hidden');
            requestAnimationFrame(() => {
                mainApp.classList.remove('opacity-0');
            });
            
            document.getElementById('user-display-name').textContent = currentUserName;
            const avatarUrl = `https://api.dicebear.com/7.x/shapes/svg?seed=${currentUserName}`;
            document.getElementById('user-avatar').src = avatarUrl;
            document.getElementById('create-avatar').src = avatarUrl;

            initShoutsListener();
        }

        function initShoutsListener() {
            if (!authenticatedUser) return;
            if (unsubscribeShouts) unsubscribeShouts();

            const nodeName = STORAGE_NODES[activeNodeIndex];
            const nodeIndicatorText = document.getElementById('active-node-text');
            const nodeIndicator = document.getElementById('node-indicator');
            
            if (nodeIndicatorText) nodeIndicatorText.textContent = `Node ${activeNodeIndex + 1}`;
            if (nodeIndicator) nodeIndicator.classList.remove('hidden');
            
            const collectionPath = collection(db, 'artifacts', appId, 'public', 'data', nodeName);
            const q = query(collectionPath, orderBy('createdAt', 'desc'));

            unsubscribeShouts = onSnapshot(q, 
                (snapshot) => {
                    const list = document.getElementById('shouts-list');
                    list.innerHTML = '';
                    
                    snapshot.forEach((doc) => {
                        const s = doc.data();
                        const card = document.createElement('div');
                        card.className = "bg-[#1e293b] flex hub-border rounded-2xl shadow-sm overflow-hidden card-hover transition-all duration-300";
                        card.innerHTML = `
                            <div class="sidebar-accent"></div>
                            <div class="p-6 flex-1 flex gap-4">
                                <img src="https://api.dicebear.com/7.x/shapes/svg?seed=${s.username}" class="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2 mb-2">
                                        <span class="text-[10px] font-black text-sky-400 uppercase tracking-widest">${s.username}</span>
                                        <span class="text-[8px] text-slate-500">• Hub Node ${activeNodeIndex + 1}</span>
                                    </div>
                                    <p class="text-sm text-slate-200 leading-relaxed font-medium">${s.text}</p>
                                </div>
                            </div>
                        `;
                        list.appendChild(card);
                    });
                },
                (error) => {
                    console.warn(`Node ${activeNodeIndex + 1} Error:`, error.message);
                    if (activeNodeIndex < STORAGE_NODES.length - 1) {
                        activeNodeIndex++;
                        initShoutsListener();
                    }
                }
            );
        }

        window.submitShout = async () => {
            if (!authenticatedUser) return;
            const input = document.getElementById('shout-input');
            const text = input.value.trim();
            if (!text) return;
            const btn = document.querySelector('button[onclick="submitShout()"]');
            const originalText = btn.textContent;
            try {
                btn.disabled = true;
                btn.textContent = "SENDING...";
                const nodeName = STORAGE_NODES[activeNodeIndex];
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', nodeName), {
                    text,
                    username: currentUserName,
                    userId: authenticatedUser.uid,
                    createdAt: serverTimestamp()
                });
                input.value = '';
            } catch (e) {
                console.error("Submission error:", e);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        };
    </script>
</body>
</html>
